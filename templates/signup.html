{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Login Form</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Sign Up</h2>
                <p>Create a new account to get started</p>
            </div>
            
            <form class="login-form" id="loginForm" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    
                    {% comment %} <div class="input-wrapper" style="margin-bottom: 15px;">
                        <input type="text" id="name" name="username" placeholder="Enter username" required>
                        
                    </div>  {% endcomment %}

                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="Enter email" required autocomplete="email">
                       
                        {% if error %}
                    <div style="color: red;">{{ error }}</div>
                {% endif %}
                    </div>
                    
                </div>
                

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password"  placeholder="password"required autocomplete="current-password">
                        
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <span class="eye-icon"></span>
                        </button>
                    </div>

                    <div class="input-wrapper password-wrapper" style="margin-top: 15px;">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required autocomplete="current-password">
                        
                        <button type="button" class="password-toggle" id="confirmPasswordToggle" aria-label="Toggle password visibility">
                            <span class="eye-icon"></span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="login-btn">
                    <span class="btn-text">Sign Up</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div class="signup-link">
                <p>Already have an account? <a href="{% url 'account:login' %}">Sign In</a></p>
            </div>

        </div>
    </div>

    
</body>
</html>
