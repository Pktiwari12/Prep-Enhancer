{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Login Form</title>
    <style>
    </style>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h2>Sign In</h2>
          <p>Enter your credentials to access your account</p>
        </div>

        {% if error %}
          <div  style="color: red;">{{ error }}</div>
        {% endif %}

        <form class="login-form" id="loginForm" method="POST" action="{% url 'account:login' %}">
          {% csrf_token %}
          <div class="form-group">
            <div class="input-wrapper">
              <input type="text" id="name" name="username" placeholder="Enter your email" required />
              
            </div>
            <span class="error-message" id="nameError"></span>
          </div>

          <div class="form-group">
            <div class="input-wrapper password-wrapper">
              <input type="password" id="password" name="password" placeholder="Enter your password" required />
              
              <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility"><span class="eye-icon"></span></button>
            </div>
            <span class="error-message" id="passwordError"></span>
          </div>

          <div class="form-options">
            <label class="remember-wrapper">
              <input type="checkbox" id="remember" name="remember" />
              <span class="checkbox-label">
                <span class="checkmark"></span>
                Remember me
              </span>
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>

          <button type="submit" class="login-btn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader"></span>
          </button>
        </form>

        <div class="signup-link">
          <p>
            Don't have an account? <a href="{% url 'account:signup' %}">Create one</a>
          </p>
        </div>

        <div class="success-message" id="successMessage">
          <div class="success-icon">✓</div>
          <h3>Login Successful!</h3>
          <p>Redirecting to your dashboard...</p>
        </div>
      </div>
    </div>
  </body>
</html>
